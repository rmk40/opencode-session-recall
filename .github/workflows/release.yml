name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run ci

      - name: Publish to npm
        run: npm publish --access public

      - name: Create GitHub Release
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag --latest=true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
